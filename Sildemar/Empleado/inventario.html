<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Inventario - Sildemar</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <link rel="stylesheet" href="../css/styles.css">
</head>

<body>

    <div class="sidebar">

        <h2>SILDEMAR</h2>

        <a href="empleado.html"><i class="fas fa-home"></i> Mi Panel</a>

        <a href="#"><i class="fas fa-boxes"></i> Ver Inventario</a>

        <a href="nueva_solicitud.html"><i class="fas fa-plus-circle"></i> Nueva Solicitud</a>

        <a href="mis_solicitudes.html"><i class="fas fa-shopping-cart"></i> Mis Solicitudes</a>

        <a href="#" id="logout-btn" style="margin-top:40px;background:#c0392b;">
            <i class="fas fa-sign-out-alt"></i> Cerrar Sesión
        </a>

    </div>

    <div class="main-content">

        <header>
            <h2>Inventario</h2>
            <br>
            <input type="text" id="busqueda" class="search-box" placeholder="Buscar producto, código, marca o carro...">
        </header>

        <table>

            <thead>
                <tr>
                    <th>Código</th>
                    <th>Producto</th>
                    <th>Marca</th>
                    <th>Carro</th>
                    <th>Año</th>
                    <th>Precio Venta</th>
                    <th>Stock</th>
                </tr>
            </thead>

            <tbody id="tablaInventario"></tbody>

        </table>

    </div>

    <script>

        function applySecurity() {

            const userData = JSON.parse(localStorage.getItem('usuario_actual'))

            if (!userData || userData.rol !== 'Empleado') {
                window.location.href = "../index.html"
            }

        }

        document.getElementById('logout-btn').addEventListener('click', function (e) {

            e.preventDefault()

            localStorage.removeItem('usuario_actual')

            window.location.href = "../index.html"

        })

        let productos = [];

        async function cargarInventario() {
            try {
                const res = await fetch('../backend/inventario.php?action=list');
                const data = await res.json();

                productos = data.map(p => ({
                    id: p.id_producto,
                    codigo: p.codigo || `PROD-${p.id_producto}`,
                    nombre: p.nombre_producto,
                    marca: p.marca_repuesto || "N/A",
                    carro: p.marca_carro || "N/A",
                    anio: "Universal",
                    precio: parseFloat(p.precio).toFixed(2),
                    stock: p.stock_actual
                }));

                mostrarProductos(productos);
            } catch (e) {
                console.error("Error cargando inventario:", e);
            }
        }

        function mostrarProductos(lista) {

            const tabla = document.getElementById("tablaInventario")

            tabla.innerHTML = ""

            lista.forEach(p => {

                tabla.innerHTML += `

<tr>

<td>${p.codigo}</td>

<td>${p.nombre}</td>

<td>${p.marca}</td>

<td>${p.carro}</td>

<td>${p.anio}</td>

<td>$${p.precio}</td>

<td>${p.stock}</td>

</tr>

`

            })

        }

        function buscarProducto() {

            const texto = document.getElementById("busqueda").value.toLowerCase()

            const filtrados = productos.filter(p =>

                p.codigo.toLowerCase().includes(texto) ||

                p.nombre.toLowerCase().includes(texto) ||

                p.marca.toLowerCase().includes(texto) ||

                p.carro.toLowerCase().includes(texto)

            )

            mostrarProductos(filtrados)

        }

        document.getElementById("busqueda").addEventListener("keyup", buscarProducto)

        window.onload = function () {

            applySecurity()

            cargarInventario()

        }

    </script>

</body>

</html>
