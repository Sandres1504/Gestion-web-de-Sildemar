<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Recuperar Cuenta - Sildemar</title>
<style>
body{margin:0;font-family:Arial,sans-serif;background-color:#0056b3;display:flex;justify-content:center;align-items:center;min-height:100vh;}
.form-container{max-width:400px;width:100%;padding:30px;background-color:#fff;box-shadow:0 4px 15px rgba(0,0,0,0.3);border-radius:8px;text-align:center;}
h2{margin-bottom:20px;color:#333;}
input[type="email"],.btn-submit{width:100%;padding:12px 15px;margin:10px 0;border:1px solid #ccc;border-radius:4px;box-sizing:border-box;}
.btn-submit{background-color:#004080;color:#fff;border:none;cursor:pointer;transition:0.3s;}
.btn-submit:hover{background-color:#0056b3;}
.links{margin-top:15px;font-size:0.9em;}
.links a{color:#004080;text-decoration:none;font-weight:bold;}
.links a:hover{text-decoration:underline;}
</style>
</head>
<body>
<div class="form-container">
<h2>Recuperar Cuenta</h2>
<form onsubmit="return recuperar(event)">
  <input type="email" id="email" placeholder="Ingresa tu correo" required>
  <button type="submit" class="btn-submit">Recuperar</button>
</form>
<div class="links">
<a href="login.html">Volver al Login</a>
</div>
</div>
<script>
function recuperar(e){
  e.preventDefault();
  alert("Si el correo existe, se enviarán instrucciones para recuperar tu cuenta.");
  window.location.href="login.html";
  return false;
}
</script>
</body>
</html>
