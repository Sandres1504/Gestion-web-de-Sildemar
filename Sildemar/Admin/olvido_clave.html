<!DOCTYPE html>
<html lang="es">
<head>

<title>Olvido Clave - Sildemar</title>
<style>
body{margin:0;font-family:Arial,sans-serif;background-color:#0056b3;display:flex;justify-content:center;align-items:center;min-height:100vh;}

.btn-submit:hover{background-color:#0056b3;}
.links{margin-top:15px;font-size:0.9em;}
.links a{color:#004080;text-decoration:none;font-weight:bold;}
.links a:hover{text-decoration:underline;}

<div class="form-container">
<h2>Olvidé mi Contraseña</h2>
<p>Si olvidaste tu contraseña, contacta con soporte o sigue las instrucciones enviadas a tu correo.</p>
<button class="btn-submit" onclick="alert('Redirigiendo a soporte...')">Contactar Soporte</button>
<div class="links">

</div>
</div>
